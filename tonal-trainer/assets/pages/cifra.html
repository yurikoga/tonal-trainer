<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador de Cifras</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="led-container">
        <div class="led led-red"></div>
    </div>

    <main class="container">
        <a href="../../index.html" class="btn-voltar">← Voltar ao Menu</a>
        
        <section class="card-section">
            <h2>Sorteador de Cifras</h2>
            <h1 id="resultado">?</h1>
            <button onclick="sortear()">Sortear Cifra</button>
        </section>
    </main>

    <script>
        function sortear() {
            const graus = ['C','D','E','F','G','A','B'];
            const sorteado = graus[Math.floor(Math.random() * graus.length)];
            document.getElementById("resultado").innerText = sorteado;
        }
    </script>
</body>
</html>
